main: com.fernsehheft.playerstatsremake.core.Main
name: PlayerStatsRemake
version: ${project.version}
api-version: 1.20
folia-supported: true
description: A modern, actively maintained statistics plugin for Minecraft servers
author: Fernsehheft, djtmk
softdepend:
  - PlaceholderAPI
  - DiscordSRV

commands:
  statistic:
    aliases:
      - stat
      - stats
    description: show player statistics in private chat
    usage: "§6/stat info"
    permission: playerstatsremake.stat
  statisticshare:
    aliases:
      - statshare
      - statsshare
    description: share last stat lookup in chat
    usage: "§6/This command can only be executed by clicking the \"share\" button in /stat results. 
    If you don't see this button, you don't have share-permission, or sharing is turned off."
    permission: playerstatsremake.share
  statisticreload:
    aliases:
      - statreload
      - statsreload
    description: reloads the config
    usage: "§6/statreload"
    permission: playerstatsremake.reload
  statisticexclude:
    aliases:
      - statexclude
      - statsexclude
    description: hide this player's statistics from /stat results
    usage: "§6/statexclude info"
    permission: playerstatsremake.exclude
  statcolor:
    aliases:
      - statscolor
    description: set a custom color for your name in stats
    usage: "§6/statcolor <color|hex|reset>"
    permission: playerstatsremake.color
permissions:
  playerstatsremake.color:
    description: allows setting a custom stat color
    default: true
  playerstatsremake.stat:
    description: allows usage of /statistic
    default: false
  playerstatsremake.share:
    description: allows sharing stats in chat
    default: false
  playerstatsremake.exclude:
    description: allows usage of /statexclude
    default: op
  playerstatsremake.reload:
    description: allows usage of /statreload
    default: op