name: Auto Release on Version Bump

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version from pom.xml
        id: extract_version
        run: |
          VERSION=$(grep -m 1 '<version>' pom.xml | sed -E 's/.*<version>([^<]+)<\/version>.*/\1/' | tr -d '\r\n\t ')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Check if Release already exists
        id: check_release
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${{ env.VERSION }}$"; then
            echo "Release for version ${{ env.VERSION }} already exists. Skipping..."
            echo "skip=true" >> $GITHUB_ENV
          else
            echo "skip=false" >> $GITHUB_ENV
          fi

      - name: Setup Java 21
        if: env.skip == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build Plugin
        if: env.skip == 'false'
        run: mvn clean package -DskipTests

      - name: Create GitHub Release
        if: env.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.VERSION }}"
          name: "PlayerStatsRemake v${{ env.VERSION }}"
          generate_release_notes: true
          body: |
            **PlayerStatsRemake v${{ env.VERSION }}** has been released!
            
            ### API Usage (JitPack)
            To use this version in your own plugin, add JitPack to your repositories and use the following dependency:
            
            ```xml
            <dependency>
                <groupId>com.github.Fernsehheft</groupId>
                <artifactId>PlayerStatsRemake</artifactId>
                <version>${{ env.VERSION }}</version>
                <scope>provided</scope>
            </dependency>
            ```
          files: target/PlayerStatsRemake-${{ env.VERSION }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
